{% extends 'base.html' %}

{% block content %}
<div class="bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">All Users</h1>

  {% if users %}
    <table class="w-full border text-sm">
      <thead class="bg-gray-100">
        <tr>
          <th class="border px-3 py-2 text-left">ID</th>
          <th class="border px-3 py-2 text-left">Username</th>
          <th class="border px-3 py-2 text-left">Role</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
          <tr>
            <td class="border px-3 py-2">{{ user.id }}</td>
            <td class="border px-3 py-2">{{ user.username }}</td>
            <td class="border px-3 py-2 capitalize">{{ user.role }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p class="text-gray-600">No users found.</p>
  {% endif %}
</div>
{% endblock %}
