{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Login</h1>
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm mb-1">Username</label>
      <input name="username" type="text" class="w-full border rounded px-3 py-2" required>
    </div>
    <div>
      <label class="block text-sm mb-1">Password</label>
      <input name="password" type="password" class="w-full border rounded px-3 py-2" required>
    </div>
    <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
  </form>
  <p class="mt-4 text-sm">No account? <a href="{{ url_for('register') }}" class="text-blue-600">Register</a></p>
  <p class="mt-2 text-xs text-gray-600">Default admin: admin / admin123</p>
</div>
{% endblock %}
