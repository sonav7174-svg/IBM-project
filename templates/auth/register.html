{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Register</h1>
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm mb-1">Username</label>
      <input name="username" type="text" class="w-full border rounded px-3 py-2" required>
    </div>
    <div>
      <label class="block text-sm mb-1">Password</label>
      <input name="password" type="password" class="w-full border rounded px-3 py-2" required>
    </div>
    <div>
      <label class="block text-sm mb-1">Role</label>
      <select name="role" class="w-full border rounded px-3 py-2">
        <option value="user">User</option>
        <option value="instructor">Instructor</option>
      </select>
    </div>
    <button class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Create Account</button>
  </form>
</div>
{% endblock %}
